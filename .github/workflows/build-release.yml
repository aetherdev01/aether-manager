name: Build Release APK

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build & Sign Release APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. JDK 17 ─────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ── 3. Android SDK (built-in di ubuntu-latest) ─────────────────────────
      - name: Setup Android SDK
        run: |
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          sdkmanager --update

      # ── 4. Install NDK 27 & CMake 3.22 ────────────────────────────────────
      - name: Install NDK & CMake
        run: |
          sdkmanager \
            "ndk;27.0.12077973" \
            "cmake;3.22.1"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.0.12077973" >> $GITHUB_ENV
          echo "NDK_VERSION=27.0.12077973" >> $GITHUB_ENV

      # ── 5. Cache Gradle ────────────────────────────────────────────────────
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts','**/libs.versions.toml','**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      # ── 6. Grant execute permission ────────────────────────────────────────
      - name: Make gradlew executable
        run: chmod +x gradlew

      # ── 7. Build Release APK (minify + DEX + NDK .so) ─────────────────────
      - name: Build Release APK
        run: |
          ./gradlew assembleRelease \
            --no-daemon \
            --stacktrace \
            -Pandroid.ndkVersion=${{ env.NDK_VERSION }}
        env:
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}

      # ── 8. Sign APK (aktif jika secret KEYSTORE_BASE64 sudah diisi) ────────
      #
      #  Cara isi secret:
      #  Repo → Settings → Secrets and variables → Actions → New repository secret
      #    KEYSTORE_BASE64  : hasil dari:  base64 -w 0 key.jks
      #    KEY_ALIAS        : alias key di keystore
      #    KEY_PASSWORD     : password key
      #    STORE_PASSWORD   : password keystore
      #
      - name: Sign APK
        if: env.KEYSTORE_BASE64_EXISTS == 'true'
        env:
          KEYSTORE_BASE64_EXISTS: ${{ secrets.KEYSTORE_BASE64 != '' && 'true' || 'false' }}
        uses: ilharp/sign-android-release@v1
        with:
          releaseDir: app/build/outputs/apk/release
          signingKey: ${{ secrets.KEYSTORE_BASE64 }}
          keyAlias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
          buildToolsVersion: "35.0.0"

      # ── 9. Rename artefak ─────────────────────────────────────────────────
      - name: Rename APK
        run: |
          mkdir -p artifacts
          APK=$(find app/build/outputs/apk/release -name "*.apk" | grep -v unsigned | head -1)
          # fallback ke unsigned kalau belum sign
          [ -z "$APK" ] && APK=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          VERSION=$(grep 'versionName' app/build.gradle.kts | grep -oP '"\K[^"]+')
          cp "$APK" "artifacts/AetherManager-v${VERSION}-release.apk"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          ls -lh artifacts/

      # ── 10. Upload artifact ────────────────────────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: AetherManager-release-apk
          path: artifacts/*.apk
          retention-days: 30

      # ── 11. Build summary ──────────────────────────────────────────────────
      - name: Build summary
        run: |
          echo "## ✅ Build Selesai" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Nilai |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Versi | ${{ env.VERSION }} |" >> $GITHUB_STEP_SUMMARY
          echo "| NDK | ${{ env.NDK_VERSION }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Minify | ✅ R8 + ProGuard |" >> $GITHUB_STEP_SUMMARY
          echo "| DEX | ✅ D8 minified |" >> $GITHUB_STEP_SUMMARY
          echo "| ABI | arm64-v8a + armeabi-v7a |" >> $GITHUB_STEP_SUMMARY
          echo "| Native | libaether-x.so stripped |" >> $GITHUB_STEP_SUMMARY

  # ── 12. Auto Release saat push tag v* ─────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: AetherManager-release-apk
          path: release-apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-apk/*.apk
          generate_release_notes: true
          name: "AetherManager ${{ github.ref_name }}"
          body: |
            ## AetherManager ${{ github.ref_name }}

            ### Build Info
            - ✅ R8 minify + resource shrink aktif
            - ✅ DEX minified via D8
            - ✅ NDK `libaether-x.so` compiled & stripped
            - 🏗️ ABI: `arm64-v8a`, `armeabi-v7a`

            ### Install
            Download APK di bawah dan install langsung ke device.
