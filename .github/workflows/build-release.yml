name: Build Release APK

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build & Sign Release APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. JDK 17 ─────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ── 3. Android SDK + NDK ───────────────────────────────────────────────
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK 27 & CMake 3.22
        run: |
          sdkmanager \
            "ndk;27.0.12077973" \
            "cmake;3.22.1" \
            --sdk_root=$ANDROID_SDK_ROOT
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.0.12077973" >> $GITHUB_ENV
          echo "NDK_VERSION=27.0.12077973"     >> $GITHUB_ENV

      # ── 4. Cache Gradle ────────────────────────────────────────────────────
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts','**/libs.versions.toml','**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      # ── 5. Grant execute permission ────────────────────────────────────────
      - name: Make gradlew executable
        run: chmod +x gradlew

      # ── 6. Build Release APK (minify + DEX + NDK .so) ─────────────────────
      - name: Build Release APK
        run: |
          ./gradlew assembleRelease \
            --no-daemon \
            --stacktrace \
            -Pandroid.ndkVersion=${{ env.NDK_VERSION }}
        env:
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}

      # ── 7. Sign APK (opsional – aktifkan jika Secrets sudah diisi) ─────────
      #
      #  Tambahkan secrets berikut di repo → Settings → Secrets → Actions:
      #    KEYSTORE_BASE64   : base64 dari file .jks  (cat key.jks | base64)
      #    KEY_ALIAS         : alias key di keystore
      #    KEY_PASSWORD      : password key
      #    STORE_PASSWORD    : password keystore
      #
      - name: Sign APK
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.KEYSTORE_BASE64 }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "35.0.0"

      # ── 8. Rename artefak ─────────────────────────────────────────────────
      - name: Rename APK
        run: |
          mkdir -p artifacts
          # Cari APK hasil build (signed atau unsigned)
          APK=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          VERSION=$(grep 'versionName' app/build.gradle.kts | grep -oP '"\K[^"]+')
          cp "$APK" "artifacts/AetherManager-v${VERSION}-release.apk"
          echo "APK_PATH=artifacts/AetherManager-v${VERSION}-release.apk" >> $GITHUB_ENV
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      # ── 9. Upload artifact ke Actions ──────────────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: AetherManager-release-apk
          path: artifacts/*.apk
          retention-days: 30

      # ── 10. Print build summary ────────────────────────────────────────────
      - name: Build summary
        run: |
          echo "## ✅ Build Selesai" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Nilai |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Versi | ${{ env.VERSION }} |" >> $GITHUB_STEP_SUMMARY
          echo "| NDK | ${{ env.NDK_VERSION }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Minify | ✅ Aktif (R8 + ProGuard) |" >> $GITHUB_STEP_SUMMARY
          echo "| DEX | ✅ Minified (D8) |" >> $GITHUB_STEP_SUMMARY
          echo "| ABI | arm64-v8a + armeabi-v7a |" >> $GITHUB_STEP_SUMMARY
          echo "| Native lib | libaether-x.so (stripped) |" >> $GITHUB_STEP_SUMMARY

  # ── 11. Auto Release di tag v* ─────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: AetherManager-release-apk
          path: release-apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-apk/*.apk
          generate_release_notes: true
          name: "AetherManager ${{ github.ref_name }}"
          body: |
            ## AetherManager ${{ github.ref_name }}

            ### Build Info
            - ✅ R8 minify + resource shrink aktif
            - ✅ DEX minified via D8
            - ✅ NDK `libaether-x.so` compiled & stripped
            - 🏗️ ABI: `arm64-v8a`, `armeabi-v7a`

            ### Install
            Download APK di bawah dan install langsung ke device.
