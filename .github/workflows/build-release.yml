name: Build Release APK

on:
  push:
    branches: [main, master]
    tags:
      - "v*"
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build & Sign Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK & CMake
        run: |
          sdkmanager --install "ndk;27.0.12077973" "cmake;3.22.1"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.0.12077973" >> $GITHUB_ENV
          echo "NDK_VERSION=27.0.12077973" >> $GITHUB_ENV

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build Release APK
        run: |
          ./gradlew assembleRelease --no-daemon --stacktrace -Pandroid.ndkVersion=${{ env.NDK_VERSION }}
        env:
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}

      - name: Sign APK
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        uses: ilharp/sign-android-release@v1
        with:
          releaseDir: app/build/outputs/apk/release
          signingKey: ${{ secrets.KEYSTORE_BASE64 }}
          keyAlias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
          buildToolsVersion: "35.0.0"

      - name: Rename APK
        run: |
          mkdir -p artifacts
          APK=$(find app/build/outputs/apk/release -name "*.apk" | grep -v unsigned | head -n 1)
          [ -z "$APK" ] && APK=$(find app/build/outputs/apk/release -name "*.apk" | head -n 1)

          VERSION=$(grep 'versionName' app/build.gradle.kts | head -n 1 | sed -E 's/.*"([^"]+)".*/\1/')
          [ -z "$VERSION" ] && VERSION="unknown"

          cp "$APK" "artifacts/AetherManager-v${VERSION}-release.apk"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          ls -lh artifacts/

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: AetherManager-release-apk
          path: artifacts/*.apk
          retention-days: 30

      - name: Build summary
        run: |
          echo "## ✅ Build Selesai" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Nilai |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Versi | ${{ env.VERSION }} |" >> $GITHUB_STEP_SUMMARY
          echo "| NDK | ${{ env.NDK_VERSION }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Minify | ✅ R8 + ProGuard |" >> $GITHUB_STEP_SUMMARY
          echo "| DEX | ✅ D8 minified |" >> $GITHUB_STEP_SUMMARY
          echo "| ABI | arm64-v8a + armeabi-v7a |" >> $GITHUB_STEP_SUMMARY
          echo "| Native | libaether-x.so stripped |" >> $GITHUB_STEP_SUMMARY

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: AetherManager-release-apk
          path: release-apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-apk/*.apk
          generate_release_notes: true
          name: "AetherManager ${{ github.ref_name }}"
          body: |
            ## AetherManager ${{ github.ref_name }}

            ### Build Info
            - ✅ R8 minify + resource shrink aktif
            - ✅ DEX minified via D8
            - ✅ NDK `libaether-x.so` compiled & stripped
            - 🏗️ ABI: `arm64-v8a`, `armeabi-v7a`

            ### Install
            Download APK di bawah dan install langsung ke device.
            