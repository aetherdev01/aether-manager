name: Build Release APK

on:
  push:
    branches: [main, master]
    tags:
      - "v*"
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK & CMake
        run: |
          sdkmanager --install "ndk;27.0.12077973" "cmake;3.22.1"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.0.12077973" >> $GITHUB_ENV
          echo "NDK_VERSION=27.0.12077973" >> $GITHUB_ENV

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Grant execute
        run: chmod +x gradlew

      - name: Build Release APK
        run: |
          ./gradlew assembleRelease --no-daemon --stacktrace -Pandroid.ndkVersion=${{ env.NDK_VERSION }}

      # ✅ SIGN OPTIONAL (AMAN, GA ERROR)
      - name: Sign APK
        if: ${{ env.KEYSTORE_BASE64 != '' }}
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        uses: ilharp/sign-android-release@v1
        with:
          releaseDir: app/build/outputs/apk/release
          signingKey: ${{ env.KEYSTORE_BASE64 }}
          keyAlias: ${{ env.KEY_ALIAS }}
          keyStorePassword: ${{ env.STORE_PASSWORD }}
          keyPassword: ${{ env.KEY_PASSWORD }}
          buildToolsVersion: "35.0.0"

      - name: Collect APK
        run: |
          mkdir -p artifacts
          find app/build/outputs/apk/release -name "*.apk" -exec cp {} artifacts/ \;
          ls -lh artifacts

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AetherManager-APK
          path: artifacts/*.apk

  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: AetherManager-APK
          path: release

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.apk
          generate_release_notes: true