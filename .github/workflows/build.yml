name: Build Aether Manager

on:
  push:
    branches: [ main, master ]
    tags:     [ 'v*' ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > aether.jks

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Fix gradlew permission
        run: chmod +x gradlew

      - name: Build Release APK
        env:
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS:      ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:   ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Get APK names
        run: |
          RELEASE_APK=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          DEBUG_APK=$(find app/build/outputs/apk/debug -name "*.apk" | head -1)
          echo "RELEASE_APK=$RELEASE_APK" >> $GITHUB_ENV
          echo "DEBUG_APK=$DEBUG_APK"     >> $GITHUB_ENV
          echo "RELEASE_NAME=$(basename $RELEASE_APK)" >> $GITHUB_ENV
          echo "DEBUG_NAME=$(basename $DEBUG_APK)"     >> $GITHUB_ENV
          echo "── Output ──"
          ls -lh app/build/outputs/apk/release/
          ls -lh app/build/outputs/apk/debug/

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.RELEASE_NAME }}
          path: ${{ env.RELEASE_APK }}
          retention-days: 30

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.DEBUG_NAME }}
          path: ${{ env.DEBUG_APK }}
          retention-days: 7

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.RELEASE_APK }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
