# ──────────────────────────────────────────────────────────────────────────────
# Tambahkan entry berikut ke gradle/libs.versions.toml milikmu
# ──────────────────────────────────────────────────────────────────────────────

# ── [versions] ────────────────────────────────────────────────────────────────
# Tambahkan di bawah versi yang sudah ada:

coreSplashscreen        = "1.0.1"
coil                    = "2.7.0"
okhttp                  = "4.12.0"
gson                    = "2.11.0"
workRuntimeKtx          = "2.9.1"
lifecycleRuntimeCompose = "2.8.7"   # sesuaikan dengan lifecycleRuntimeKtx yang sudah ada


# ── [libraries] ───────────────────────────────────────────────────────────────
# Tambahkan di bawah library yang sudah ada:

androidx-core-splashscreen      = { group = "androidx.core",            name = "core-splashscreen",      version.ref = "coreSplashscreen" }
coil-compose                    = { group = "io.coil-kt",               name = "coil-compose",           version.ref = "coil" }
okhttp                          = { group = "com.squareup.okhttp3",     name = "okhttp",                 version.ref = "okhttp" }
okhttp-logging                  = { group = "com.squareup.okhttp3",     name = "logging-interceptor",    version.ref = "okhttp" }
gson                            = { group = "com.google.code.gson",     name = "gson",                   version.ref = "gson" }
androidx-work-runtime-ktx       = { group = "androidx.work",            name = "work-runtime-ktx",       version.ref = "workRuntimeKtx" }
androidx-lifecycle-runtime-compose = { group = "androidx.lifecycle",    name = "lifecycle-runtime-compose", version.ref = "lifecycleRuntimeCompose" }
