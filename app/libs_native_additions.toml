# ──────────────────────────────────────────────────────────────────────────────
# Tambahkan entry berikut ke gradle/libs.versions.toml
# (Native libraries — menghasilkan .so di APK)
# ──────────────────────────────────────────────────────────────────────────────

# ── [versions] ────────────────────────────────────────────────────────────────

libsu          = "5.3.0"
mmkv           = "2.0.1"
relinker       = "1.4.5"
zstdJni        = "1.5.5-11"
sqliteAndroid  = "3.46.0"


# ── [libraries] ───────────────────────────────────────────────────────────────

# libsu — root shell, menghasilkan libsu-core.so
libsu-core     = { group = "com.github.topjohnwu.libsu", name = "core",    version.ref = "libsu" }
libsu-service  = { group = "com.github.topjohnwu.libsu", name = "service", version.ref = "libsu" }
libsu-io       = { group = "com.github.topjohnwu.libsu", name = "io",      version.ref = "libsu" }

# MMKV — native key-value store, menghasilkan libmmkv.so
mmkv           = { group = "com.tencent",                name = "mmkv",     version.ref = "mmkv" }

# ReLinker — safe .so loader (pure Java, tapi untuk load .so native)
relinker       = { group = "com.getkeepsafe.relinker",   name = "relinker", version.ref = "relinker" }

# Zstd-jni — native compression, menghasilkan libzstd-jni.so
zstd-jni       = { group = "com.github.luben",           name = "zstd-jni", version.ref = "zstdJni" }

# sqlite-android — SQLite native terbaru, menghasilkan libsqliteX.so
sqlite-android = { group = "org.signal",                 name = "sqlite-android", version.ref = "sqliteAndroid" }


# ── [repositories] ────────────────────────────────────────────────────────────
# libsu ada di JitPack — pastikan di settings.gradle.kts sudah ada:
#
#   maven { url = uri("https://jitpack.io") }
#
# MMKV, ReLinker, Zstd-jni, sqlite-android → Maven Central (sudah ada default)


# ── .so yang akan muncul di APK lib/ ─────────────────────────────────────────
#
#   lib/arm64-v8a/
#     libsu.so          ← libsu
#     libmmkv.so        ← MMKV
#     libzstd-jni.so    ← Zstd-jni
#     libsqliteX.so     ← sqlite-android
#     libaether-x.so    ← milik kamu (NDK)
#
#   lib/armeabi-v7a/   (sama, versi 32-bit)
